# A TOML linter such as https://taplo.tamasfe.dev/ can use this schema to validate your config.
# If you encounter any issues, please make an issue at https://github.com/yazi-rs/schemas.

#:schema https://yazi-rs.github.io/schemas/yazi.json

[mgr]
ratio          = [ 1, 2, 5 ]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
sort_translit  = false
linemode       = "size"
show_hidden    = false
show_symlink   = true
scrolloff      = 5
mouse_events   = [ "click", "scroll" ]


[preview]
tab_size        = 2
max_width       = 600
max_height      = 900
cache_dir       = ""
image_delay     = 30
image_filter    = "triangle"
image_quality   = 75
sixel_fraction  = 15
ueberzug_scale  = 1
ueberzug_offset = [ 0, 0, 0, 0 ]

[opener]
edit = [
	{ run = '$EDITOR "$@"', block = true, desc = "Edit file in EDITOR", for = "unix" },
	{ run = "code -w %s",    desc = "code (block)", for = "windows", block = true },
]
play = [
	{ run = 'mpv --force-window "$@"', desc = "Play media in mpv", orphan = true, for = "unix" },
	{ run = "xdg-open %s1",            desc = "Play", for = "linux", orphan = true },
]
open = [
	{ run = 'xdg-open "$1"', desc = "Open file with xdg-open", orphan = true, for = "unix" },
]
reveal = [
	{ run = 'xdg-open "$(dirname "$1")"', desc = "Open containing folder", for = "unix" },
	{ run = "xdg-open %d1",                desc = "Reveal", for = "linux" },
]
extract = [
	{ run = 'ouch d -y %*', desc = "Extract here with ouch", for = "windows" },
	{ run = 'ouch d -y "$@"', desc = "Extract here with ouch", for = "unix" },
	{ run = "ya pub extract --list %s", desc = "Extract here (fallback)" },
]
download = [
	{ run = "ya emit download --open %S", desc = "Download and open" },
	{ run = "ya emit download %S",        desc = "Download" },
]
ebook = [
	{ run = 'zathura "$1"', desc = "Open eBook in Zathura", orphan = true, for = "unix" },
]
office = [
	{ run = 'libreoffice "$1"', desc = "Open document in LibreOffice", orphan = true, for = "unix" },
]
sc-im = [
	{ run = 'sc-im "$1"', desc = "Open spreadsheet in sc-im", block = true, for = "unix" },
]
image = [
	{ run = "imv %s", desc = "View image in imv", orphan = true, for = "unix" },
]

[open]
rules = [
    # Folder
    { url = "*/", use = [ "edit", "open", "reveal" ] },
	# Spreadsheet
	{ mime = "text/sc", use = [ "sc-im", "edit" ] },
	{ mime = "text/csv", use = [ "sc-im", "edit" ] },
	# Text
	{ mime = "text/*", use = [ "edit", "reveal" ] },
	{ mime = "application/{json,ndjson}", use = [ "edit", "reveal" ] },
	{ mime = "*/javascript", use = [ "edit", "reveal" ] },
	{ mime = "application/{mbox,javascript,wine-extension-ini}", use = [ "edit", "reveal" ] },
	# Media
	{ mime = "{audio,video}/*", use = [ "play", "reveal" ] },
	# Empty
	{ mime = "inode/empty", use = [ "edit", "reveal" ] },
	# Image
	{ mime = "image/*", use = [ "open", "image" ] },
	# Office
	{ mime = "application/openxmlformats-officedocument.*", use = "office" },
	{ mime = "application/oasis.opendocument.*", use = "office" },
	{ mime = "application/ms-*", use = "office" },
	{ mime = "application/msword", use = "office" },
	# Archive
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = "extract" },
    # eBook
    { url = "*.cb[7rz]", use = [ "ebook", "reveal" ] },
    # Fallback
    { url = "*", use = [ "open", "reveal" ] },
]

[tasks]
file_workers     = 10
plugin_workers   = 10
fetch_workers    = 5
preload_workers  = 2
process_workers  = 5
bizarre_retry    = 3
image_alloc      = 536870912  # 512MB
image_bound      = [ 0, 0 ]
suppress_preload = false

[plugin]
fetchers = [
	# MIME-type
	{ id = "mime_dir",    url = "*/",         run = "mime.dir",    prio = "high", group = "mime" },
	{ id = "mime_local",  url = "local://*",  run = "mime.local",  prio = "high", group = "mime" },
	{ id = "mime_remote", url = "remote://*", run = "mime.remote", prio = "high", group = "mime" },
]
spotters = [
    { id = "folder", url = "*/", run = "folder" },
	# Code
	{ id = "code",    mime = "text/*", run = "code" },
	{ id = "code2",   mime = "*/{xml,javascript,wine-extension-ini}", run = "code" },
	# Image
	{ id = "magick",  mime = "image/{avif,hei?,jxl,svg+xml}", run = "magick" },
	{ id = "image",   mime = "image/*", run = "image" },
	# Video
	{ id = "video",   mime = "video/*", run = "video" },
	# Audio
	{ id = "audio",   mime = "audio/*", run = "audio" },
	# Fallback
    { id = "file",    url = "*", run = "file" },
]
prepend_preloaders = [
	# Office
	{ id = "office_docx",  mime = "application/openxmlformats-officedocument.*", run = "office" },
	{ id = "office_oodf",  mime = "application/oasis.opendocument.*", run = "office" },
	{ id = "office_ms",    mime = "application/ms-*", run = "office" },
	{ id = "office_msdoc", mime = "application/msword", run = "office" },
    { id = "office_docx2", url = "*.docx", run = "office" },
]
prepend_previewers = [
	# Image
	{ id = "magick_img",    mime = "image/{avif,hei?,jxl,svg+xml}", run = "magick" },
	{ id = "image_img",     mime = "image/*", run = "image" },

	# Video
	{ id = "video_vid",     mime = "video/*", run = "video" },

	# PDF
	{ id = "pdf_pdf",       mime = "application/pdf", run = "pdf" },

	# Epub
	{ id = "epub_epub",     mime = "application/epub+zip", run = "epub-preview" },

	# Font
	{ id = "font_font",     mime = "font/*", run = "font" },
	{ id = "font_ms",        mime = "application/ms-opentype", run = "font" },

	# Folder
    { id = "folder_folder", url = "*/", run = "folder", sync = true },

	# Code
	{ id = "code_code",     mime = "text/*", run = "code" },
	{ id = "code_xml",      mime = "*/{xml,javascript,wine-extension-ini}", run = "code" },

	# JSON
	{ id = "json_json",     mime = "application/{json,ndjson}", run = "json" },

	# Archive
	{ id = "archive_zip",   mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", run = "archive" },
	{ id = "archive_deb",   mime = "application/{debian*-package,redhat-package-manager,rpm,android.package-archive}", run = "archive" },
    { id = "archive_appimg",url = "*.{AppImage,appimage}", run = "archive" },

	# Virtual Disk / Disk Image
	{ id = "archive_iso",   mime = "application/{iso9660-image,qemu-disk,ms-wim,apple-diskimage}", run = "archive" },
	{ id = "archive_vbox",  mime = "application/virtualbox-{vhd,vhdx}", run = "archive" },
    { id = "archive_disk",  url = "*.{img,fat,ext,ext2,ext3,ext4,squashfs,ntfs,hfs,hfsx}", run = "archive" },

	# Empty file
	{ id = "empty_empty",   mime = "inode/empty", run = "empty" },

	# Audio info
	{ id = "mediainfo_aud", mime = "audio/*", run = "mediainfo" },

	# Fallback
    { id = "file_file",     url = "*", run = "file" },
]

[input]
cursor_blink = false

# cd
cd_title  = "Change directory:"
cd_origin = "top-center"
cd_offset = [ 0, 2, 50, 3 ]

# create
create_title  = [ "Create:", "Create (dir):" ]
create_origin = "top-center"
create_offset = [ 0, 2, 50, 3 ]

# rename
rename_title  = "Rename:"
rename_origin = "hovered"
rename_offset = [ 0, 1, 50, 3 ]

# filter
filter_title  = "Filter:"
filter_origin = "top-center"
filter_offset = [ 0, 2, 50, 3 ]

# find
find_title  = [ "Find next:", "Find previous:" ]
find_origin = "top-center"
find_offset = [ 0, 2, 50, 3 ]

# search
search_title  = "Search via {n}:"
search_origin = "top-center"
search_offset = [ 0, 2, 50, 3 ]

# shell
shell_title  = [ "Shell:", "Shell (block):" ]
shell_origin = "top-center"
shell_offset = [ 0, 2, 50, 3 ]

[confirm]
# trash
trash_title 	= "Trash {n} selected file{s}?"
trash_origin	= "center"
trash_offset	= [ 0, 0, 70, 20 ]

# delete
delete_title 	= "Permanently delete {n} selected file{s}?"
delete_origin	= "center"
delete_offset	= [ 0, 0, 70, 20 ]

# overwrite
overwrite_title  = "Overwrite file?"
overwrite_content = "Will overwrite the following file:"
overwrite_origin = "center"
overwrite_offset = [ 0, 0, 50, 15 ]

# quit
quit_title  = "Quit?"
quit_content = "The following tasks are still running, are you sure you want to quit?"
quit_origin = "center"
quit_offset = [ 0, 0, 50, 15 ]

[pick]
open_title  = "Open with:"
open_origin = "hovered"
open_offset = [ 0, 1, 50, 7 ]

[which]
sort_by        = "none"
sort_sensitive = false
sort_reverse   = false
sort_translit  = false
